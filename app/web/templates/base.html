<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hypervisor Monitor</title>
<!--  <link rel="stylesheet" href="/static/vendor/pico.min.css">-->
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/vendor/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="/static/vendor/dataTables.dataTables.min.css">
  <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
<main class="container-fluid"> <header class="app-header">
  <div class="header-left">
    <div class="brand">
      <div class="brand">
        <div class="logo-dot"></div>
        <h1>Hypervisor Monitor <small style="font-size: 0.45em; color: var(--text-muted); font-weight: 500; vertical-align: middle;">by DBL</small></h1>
      </div>
    </div>
    <nav class="tabs-nav">
      <a href="#" id="tab-hosts" class="tab active" data-target="pane-hosts">Vue Hosts</a>
      <a href="#" id="tab-vms" class="tab" data-target="pane-vms">Toutes les VMs</a>
    </nav>
  </div>
  <div class="header-right">
    <div class="search-container">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>

      <input type="text" id="global-search" placeholder="Rechercher (Host, VM, IP)..." autocomplete="off">

      <button id="clear-search-btn" class="clear-btn" aria-label="Effacer la recherche" style="display: none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <button id="refresh-btn" class="btn-primary">
      <svg class="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      <span>Actualiser</span>
    </button>
  </div>
</header>

  <section id="pane-hosts" class="pane active">
    {% block tab_hosts %}{% endblock %}
  </section>

  <section id="pane-vms" class="pane">
    {% block tab_vms %}{% endblock %}
  </section>
</main>

<dialog id="notes-modal" class="custom-modal">
  <div class="modal-header">
    <h3 id="notes-modal-title">Notes</h3>
    <button class="btn-close" onclick="closeNotesModal()" title="Fermer">&times;</button>
  </div>
  <div class="modal-body">
    <div id="notes-modal-content"></div>
  </div>
</dialog>
<dialog id="delete-modal">
  <article>
    <header>
      <a href="#close" aria-label="Close" class="close" data-target="delete-modal"></a>
      ⚠️ Supprimer l'hôte
    </header>
    <p>Vous êtes sur le point de supprimer l'hôte et toutes ses VMs de la base de données.</p>
    <p>Pour confirmer, veuillez saisir l'IP de l'hôte : <strong id="delete-target-ip-display" class="text-danger"></strong></p>
    <input type="text" id="delete-confirm-input" placeholder="Saisir l'IP ici..." autocomplete="off">
    <input type="hidden" id="delete-host-id">
    <input type="hidden" id="delete-target-ip">
    <footer>
      <button class="secondary outline" data-target="delete-modal" onclick="closeModal()">Annuler</button>
      <button id="confirm-delete-btn" class="danger" disabled>Supprimer définitivement</button>
    </footer>
  </article>
</dialog>

<script src="/static/vendor/dataTables.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
