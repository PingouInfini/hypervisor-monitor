<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hyper-V Monitor</title>
  <link rel="stylesheet" href="/static/vendor/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/vendor/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="/static/vendor/dataTables.dataTables.min.css">
  <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
<main class="container">
  <header class="app-header">
    <div class="brand">
      <div class="logo-dot"></div>
      <h1>Hyper‑V Monitor</h1>
    </div>
    <nav>
      <ul>
        <li><a href="#" id="tab-hosts" class="tab active" data-target="pane-hosts">Vue Hosts</a></li>
        <li><a href="#" id="tab-vms" class="tab" data-target="pane-vms">Toutes les VMs</a></li>
        <li><button id="refresh-btn" class="contrast outline">↻ Actualiser</button></li>
      </ul>
    </nav>
  </header>

  <section id="pane-hosts" class="pane active">
    {% block tab_hosts %}{% endblock %}
  </section>

  <section id="pane-vms" class="pane">
    {% block tab_vms %}{% endblock %}
  </section>
</main>

<script src="/static/vendor/dataTables.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
